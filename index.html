<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- ✅ 모바일 화면 비율 맞추기 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>한자 학습 프로그램</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E83D1XBT1G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  
    gtag('config', 'G-E83D1XBT1G');
  </script>
  <!-- Hanzi Writer 라이브러리 -->
  <script src="https://unpkg.com/hanzi-writer/dist/hanzi-writer.min.js"></script>
</head>
<body>
  <!-- 홈 화면 -->
  <div id="home" class="page home-page">
    <h1>한자 학습 프로그램</h1>
    <div class="title-row">
      <h2>재미있게 배우는 4단계 학습</h2>
      <div id="shuffle-icon" class="shuffle-icon">🔀</div>
    </div>

    <div class="menu">
      <button onclick="startStage(1)">1단계: 한자 애니메이션</button>
      <button onclick="startStage(2)">2단계: 한자 → 음훈 퀴즈</button>
      <button onclick="startStage(3)">3단계: 음훈 → 한자 퀴즈</button>
      <button onclick="startStage(4)">4단계: 암기카드</button>
    </div>
  </div>

  <!-- 단계별 화면 -->
  <div id="stage" class="page hidden">
    <h1 id="stage-main-title"></h1>

    <!-- Sub-title + 아이콘 -->
    <div class="subtitle-row">
      <h2 id="stage-subtitle"></h2>
      <div class="stage4-controls hidden">
        <button id="shuffle-btn" class="icon-btn">🔀</button>
        <button id="toggle-btn" class="icon-btn">🔄</button>
      </div>
    </div>

    <!-- 단계별 컨텐츠 -->
    <div id="stage-content"></div>

    <!-- 네비게이션 화살표 -->
    <div class="nav-arrows">
      <div id="prevArrow" class="arrow left"></div>
      <div id="nextArrow" class="arrow right"></div>
    </div>

    <div id="home-icon" onclick="goHome()">🏠</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
